<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Predictor Pro | Match Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-blur"></div>
<div class="navbar">
    <h2>
        ⚽ Hi! I'm <span class="purple-text">Ezer</span> and here is your 
        <span class="purple-text">M</span>atch 
        <span class="purple-text">P</span>icker
    </h2>
    <div class="menu">
        <span onclick="window.location.href='index.html'">Games</span>
        <span onclick="window.location.href='index4.html'">Comps info</span>
        <span onclick="window.location.href='index3.html'">About Me</span>
    </div>
</div>
<div class="container">
    <div class="matches-section">
        <h3>Current <span class="purple-text">Matches</span></h3>
        <div class="matches-grid" id="matches">
            <div class="match-card">
                <img src="https://via.placeholder.com/220x120" alt="Match">
                <h4>France vs Argentina</h4>
                <p>Dec 18, 16:00</p>
            </div>
            </div>
    </div>

    <div class="chat-section">
        <h3>AI Football <span class="purple-text">Chatbot</span></h3>
        <div class="chat-box" id="chat">
            <div class="bot-msg">Hello! Describe the match you want to see, and i'll suggest some.</div>
        </div>
        <div class="chat-input">
            <input id="userInput" type="text" placeholder="Ask about matches..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
    <h2 id="modalTitle" style="color:white; margin-bottom: 20px;"></h2>
    <iframe id="videoFrame" width="80%" height="60%" src="" frameborder="0" allowfullscreen></iframe>
    <button onclick="closeModal()" style="margin-top:20px; padding:12px 40px; background:#ff4d4d; color:white; border:none; border-radius:50px; cursor:pointer; font-weight:bold;">Close</button>
</div>

<p class="signature-text">By Mohamed Ezer Bouzouraa</p>

<script src="script.js"></script>

</body>
</html>
